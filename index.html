<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffe77a">

    <title>파밀리케어 서비스 점검 안내</title>

    <style>
        :root {
            --page-bg: #ffe77a;
            --card-bg: #fff6cf;
            --title-color: #2f84cc;
            --text-color: #171717;
            --border-color: rgba(255, 255, 255, 0.95);
            --shadow-color: rgba(104, 83, 0, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;

            background:
                radial-gradient(
                    circle at 10% 8%,
                    rgba(255, 255, 255, 0.28),
                    transparent 30%
                ),
                radial-gradient(
                    circle at 92% 88%,
                    rgba(255, 255, 255, 0.20),
                    transparent 32%
                ),
                var(--page-bg);

            color: var(--text-color);

            font-family:
                "Pretendard",
                "Noto Sans KR",
                "Apple SD Gothic Neo",
                "Malgun Gothic",
                sans-serif;

            word-break: keep-all;
        }

        .notice-card {
            width: min(100%, 450px);
            min-height: calc(100vh - 16px);

            padding: 84px 50px 72px;

            background:
                linear-gradient(
                    145deg,
                    #fff8d8 0%,
                    var(--card-bg) 100%
                );

            border: 1.5px solid var(--border-color);
            border-radius: 12px;

            box-shadow:
                0 16px 38px var(--shadow-color);
        }

        .title {
            margin: 0 0 34px;

            color: var(--title-color);

            font-size: clamp(34px, 8vw, 43px);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.045em;
        }

        .message {
            margin: 0;

            font-size: 16px;
            line-height: 1.65;
            letter-spacing: -0.018em;
        }

        .message p {
            margin: 0 0 24px;
        }

        .message p:last-child {
            margin-bottom: 0;
        }

        .period {
            font-weight: 700;
        }

        .contact {
            margin-top: 28px;
            padding-top: 2px;

            font-size: 16px;
            line-height: 1.5;
        }

        .contact a {
            display: block;
            width: fit-content;

            color: inherit;
            text-decoration: none;
        }

        .contact a:hover,
        .contact a:focus-visible {
            color: var(--title-color);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                align-items: stretch;
            }

            .notice-card {
                width: 100%;
                min-height: calc(100vh - 16px);

                padding: 96px 50px 70px;
            }
        }

        @media (max-width: 380px) {
            .notice-card {
                padding: 72px 34px 56px;
            }

            .message,
            .contact {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

<main class="notice-card" aria-labelledby="page-title">

    <h1 class="title" id="page-title">
        요청하신 페이지는<br>
        서비스 준비중입니다.
    </h1>

    <section class="message" aria-label="서비스 점검 안내">

        <p>
            노후화된 장비 교체 및 시스템 환경 재정비를 위해<br>
            파밀리케어 서비스는
            <span class="period">
                2026년 7월 22일(수)부터<br>
                2026년 7월 29일(수)까지
            </span>
            일시적으로 서비스를<br>
            중단합니다.
        </p>

        <p>
            보다 안정적인 서비스를 제공하기 위해 신속하게<br>
            시스템 재정비를 완료하고<br>
            정상 서비스로 다시 찾아뵙겠습니다.
        </p>

        <p>
            서비스 이용에 불편을 드려 진심으로 죄송합니다.
        </p>

        <p>
            감사합니다.
        </p>

    </section>

    <footer class="contact" aria-label="문의처">

        <a href="mailto:stmlig@familidata.co.kr">
            stmlig@familidata.co.kr
        </a>

        <a href="tel:0313410534">
            031-341-0534
        </a>

    </footer>

</main>

</body>
</html>
